<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valiant LifeCare — Outreach Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F5FE; --card: #FFFFFF; --primary: #5B5FED; --primary-dark: #4F46E5;
    --primary-light: #EEF2FF; --accent: #C5F76C; --accent-dark: #84CC16;
    --success: #10B981; --success-light: #DCFCE7; --warning: #F59E0B;
    --warning-light: #FEF3C7; --danger: #EF4444; --danger-light: #FEE2E2;
    --text: #1F2937; --text-muted: #6B7280; --text-light: #9CA3AF;
    --border: #E5E7EB; --border-light: #F3F4F6; --bg-soft: #F9FAFB;
    --brand-blue: #1E3A8A;
    --shadow-lg: 0 8px 24px rgba(91, 95, 237, 0.12);
    --shadow-xl: 0 16px 40px rgba(91, 95, 237, 0.16);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; position: relative; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle, rgba(91, 95, 237, 0.04) 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; z-index: 0; }
  #dots-bg { position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.4; }
  .app-layout { display: flex; min-height: 100vh; position: relative; z-index: 2; }
  .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 24px 18px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; padding: 0 6px; }
  .brand-logo { width: 28px; height: 32px; flex-shrink: 0; }
  .brand-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: 0.5px; line-height: 1; }
  .brand-sub { font-size: 9px; color: var(--primary); letter-spacing: 2.5px; margin-top: 2px; font-weight: 600; }
  .nav { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 12px; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all 0.2s; text-decoration: none; font-weight: 500; }
  .nav-item:hover { background: var(--bg-soft); color: var(--text); }
  .nav-item.active { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(91, 95, 237, 0.3); }
  .dr-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-top: auto; }
  .dr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .live-badge { display: flex; align-items: center; gap: 6px; }
  .live-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: livePulse 1.5s ease-in-out infinite; }
  @keyframes livePulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } }
  .live-text { font-size: 9px; color: var(--success); font-weight: 700; letter-spacing: 0.6px; }
  .live-time { font-size: 9px; color: var(--text-muted); font-family: monospace; }
  .dr-stage { position: relative; height: 240px; background: linear-gradient(135deg, var(--brand-blue) 0%, var(--primary) 100%); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
  .orbit-1, .orbit-2 { position: absolute; border-radius: 50%; pointer-events: none; }
  .orbit-1 { inset: 14px; border: 1px solid rgba(197, 247, 108, 0.2); animation: spinSlow 25s linear infinite; }
  .orbit-2 { inset: 26px; border: 1px dashed rgba(255, 255, 255, 0.15); animation: spinSlow 18s linear infinite reverse; }
  @keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .doctor-img { position: absolute; bottom: 0; left: 50%; width: 200px; height: 240px; transform: translateX(-50%); animation: drBob 4s ease-in-out infinite; z-index: 5; }
  @keyframes drBob { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-6px); } }
  .doctor-img img { width: 100%; height: 100%; object-fit: contain; object-position: bottom center; filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.25)); }
  .dr-name-block { text-align: center; margin-bottom: 12px; }
  .dr-name-line { display: flex; align-items: center; justify-content: center; gap: 6px; }
  .dr-name { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
  .ai-pill { padding: 2px 8px; background: linear-gradient(135deg, var(--primary), #8B5CF6); border-radius: 8px; font-size: 9px; color: #fff; font-weight: 700; letter-spacing: 0.5px; }
  .dr-role { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
  .calling-card { background: linear-gradient(135deg, #F0FDF4, #ECFDF5); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 12px; padding: 11px; margin-bottom: 10px; }
  .calling-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .calling-label { font-size: 9px; color: var(--success); font-weight: 700; letter-spacing: 0.5px; }
  .calling-time { font-size: 9px; color: var(--success); }
  .calling-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .calling-meta { font-size: 9px; color: var(--text-muted); margin-top: 2px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat-mini { text-align: center; padding: 7px 4px; background: var(--bg-soft); border-radius: 8px; }
  .stat-num { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 700; }
  .stat-num.purple { color: var(--primary); }
  .stat-num.green { color: var(--success); }
  .stat-num.dark { color: var(--text); }
  .stat-mini-label { font-size: 8px; color: var(--text-muted); margin-top: 1px; }
  .main { flex: 1; padding: 24px 28px; min-width: 0; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .page-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
  .page-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .search-box { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; font-size: 12px; width: 240px; }
  .search-box input { flex: 1; border: 0; outline: 0; font-size: 12px; background: transparent; color: var(--text); font-family: inherit; }
  .icon-btn { width: 36px; height: 36px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
  .icon-btn .badge-dot { position: absolute; top: 6px; right: 7px; width: 7px; height: 7px; background: var(--danger); border-radius: 50%; border: 2px solid var(--card); }
  .user-card { display: flex; align-items: center; gap: 10px; padding: 5px 12px 5px 5px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; }
  .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #8B5CF6); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 700; }
  .user-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .user-role { font-size: 10px; color: var(--text-muted); }
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
  .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
  .metric-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
  .metric-card.featured { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; box-shadow: 0 8px 24px rgba(91, 95, 237, 0.3); border: 0; }
  .metric-head { display: flex; justify-content: space-between; align-items: start; margin-bottom: 14px; }
  .metric-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .metric-card.featured .metric-label { color: rgba(255, 255, 255, 0.85); }
  .metric-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  .metric-card.featured .metric-icon { background: rgba(255, 255, 255, 0.2); }
  .metric-icon.indigo { background: var(--primary-light); color: var(--primary); }
  .metric-icon.green { background: var(--success-light); color: var(--success); }
  .metric-icon.amber { background: var(--warning-light); color: var(--warning); }
  .metric-num { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; }
  .metric-card.featured .metric-num { color: #fff; }
  .metric-trend { font-size: 12px; margin-top: 8px; font-weight: 500; }
  .metric-trend.up { color: var(--success); }
  .metric-trend span { color: var(--text-muted); font-weight: 400; }
  .metric-card.featured .metric-trend span { color: rgba(255, 255, 255, 0.7); }
  .row-3 { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 16px; margin-bottom: 22px; }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .panel-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
  .panel-action { font-size: 14px; color: var(--text-light); cursor: pointer; line-height: 1; }
  .calls-list { display: flex; flex-direction: column; gap: 6px; }
  .call-row { display: flex; align-items: center; gap: 12px; padding: 10px 8px; border-radius: 10px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .avatar.av-1 { background: linear-gradient(135deg, #FCA5A5, #F87171); }
  .avatar.av-2 { background: linear-gradient(135deg, #93C5FD, #3B82F6); }
  .avatar.av-3 { background: linear-gradient(135deg, #C5F76C, #84CC16); color: var(--text); }
  .avatar.av-4 { background: linear-gradient(135deg, #DDD6FE, #8B5CF6); }
  .avatar.av-5 { background: linear-gradient(135deg, #FBBF24, #F59E0B); }
  .avatar.av-6 { background: linear-gradient(135deg, #67E8F9, #06B6D4); }
  .call-info { flex: 1; min-width: 0; }
  .call-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .call-name .doctor-inline { color: var(--text-light); font-weight: 400; }
  .call-meta { text-align: right; flex-shrink: 0; }
  .call-time { font-size: 11px; color: var(--text); font-weight: 500; }
  .call-status { font-size: 10px; margin-top: 2px; font-weight: 500; }
  .call-status.completed { color: var(--success); }
  .call-status.pending { color: var(--warning); }
  .call-status.cancelled { color: var(--text-light); }
  .pending-card { background: var(--bg-soft); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
  .pending-card.featured { background: var(--card); border: 2px solid var(--primary); }
  .pending-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .pending-info { flex: 1; min-width: 0; }
  .pending-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .pending-doc { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .pending-time { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
  .pending-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--primary); margin-bottom: 8px; }
  .pending-actions { display: flex; gap: 6px; }
  .btn-reject, .btn-accept { flex: 1; padding: 6px; border-radius: 8px; font-size: 11px; cursor: pointer; border: 0; font-weight: 600; font-family: inherit; }
  .btn-reject { background: var(--card); border: 1px solid var(--border); color: var(--text-muted); }
  .btn-accept { background: var(--primary); color: #fff; }
  .health-card { background: linear-gradient(135deg, #fff, #F0FDF4); border-radius: 16px; padding: 20px; border: 1px solid #BBF7D0; }
  .health-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .health-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .health-badge { font-size: 10px; color: var(--success); padding: 3px 10px; background: var(--success-light); border-radius: 12px; font-weight: 600; }
  .health-num { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 32px; font-weight: 800; color: var(--success); line-height: 1; }
  .health-num span { font-size: 14px; opacity: 0.6; font-weight: 600; }
  .health-num-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .health-stats { display: flex; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(16, 185, 129, 0.15); }
  .health-stat { flex: 1; text-align: center; }
  .health-stat-num { font-size: 14px; font-weight: 700; color: var(--text); }
  .health-stat-lbl { font-size: 9px; color: var(--text-muted); margin-top: 2px; }
  .health-divider { width: 1px; background: rgba(16, 185, 129, 0.15); }
  .table-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .table-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .table-actions { display: flex; gap: 8px; }
  .btn { padding: 9px 14px; border-radius: 10px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-soft); color: var(--text); font-weight: 500; font-family: inherit; }
  .btn.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table thead tr { border-bottom: 1px solid var(--border); }
  .data-table th { text-align: left; padding: 12px 10px; color: var(--text-muted); font-weight: 500; font-size: 11px; }
  .data-table tbody tr { border-bottom: 1px solid var(--border-light); cursor: pointer; transition: all 0.2s; }
  .data-table tbody tr:hover { background: var(--bg-soft); }
  .data-table td { padding: 14px 10px; color: var(--text); white-space: nowrap; }
  .row-id-cell { color: var(--primary); font-weight: 600; cursor: help; position: relative; }
  .row-id-cell[title]:hover::after { content: attr(title); position: absolute; bottom: 100%; left: 0; background: var(--text); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 11px; white-space: nowrap; z-index: 10; font-weight: 400; }
  .name-cell { display: flex; align-items: center; gap: 10px; }
  .name-cell .avatar { width: 30px; height: 30px; font-size: 11px; }
  .name-cell-text { font-weight: 500; }
  .status-pill { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; display: inline-block; }
  .status-pill.completed { background: var(--text); color: #fff; }
  .status-pill.ongoing { background: #DDD6FE; color: #5B21B6; }
  .status-pill.pending { background: var(--danger-light); color: #991B1B; }
  .status-pill.booked { background: var(--success-light); color: #166534; }
  .status-pill.dnc { background: var(--text); color: var(--danger); }
  .table-hint { margin-top: 16px; padding: 12px; background: linear-gradient(135deg, var(--primary-light), #F0FDF4); border-radius: 10px; text-align: center; font-size: 12px; color: var(--primary); }
  @media (max-width: 1280px) { .row-3 { grid-template-columns: 1fr 1fr; } .health-card-wrapper { grid-column: span 2; } }
  @media (max-width: 980px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } .row-3 { grid-template-columns: 1fr; } }
  @media (max-width: 768px) { .sidebar { display: none; } .main { padding: 16px; } .metrics-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<canvas id="dots-bg"></canvas>
<div class="app-layout">
